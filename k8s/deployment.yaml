apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-kb
  namespace: graph-kb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-kb
  template:
    metadata:
      labels:
        app: graph-kb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: graph-kb
          image: harbor.tuxgrid.com/platform/graph-kb
          ports:
            - containerPort: 8000
              name: mcp-sse
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: anthropic-api-key
            - name: BACKSTAGE_URL
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: backstage-url
            - name: BACKSTAGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: backstage-token
            - name: GRAPH_KB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: graph-kb-token
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /tmp/models
          volumeMounts:
            - name: kb-data
              mountPath: /app/kb
            - name: documents
              mountPath: /app/documents
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /sse
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: kb-data
          persistentVolumeClaim:
            claimName: graph-kb-data
        - name: documents
          persistentVolumeClaim:
            claimName: graph-kb-documents
        - name: tmp
          emptyDir: {}
