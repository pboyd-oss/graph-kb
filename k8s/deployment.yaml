apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-kb
  namespace: graph-kb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-kb
  template:
    metadata:
      labels:
        app: graph-kb
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - talos-default-workers-w4fn48
      imagePullSecrets:
        - name: harbor-docker-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: graph-kb
          image: harbor.tuxgrid.com/platform/graph-kb@sha256:5904ce65427fd45e8171c5eafc31ac0026d3fa783d447eddcd5e4d0867a7e4ef
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: mcp-sse
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: anthropic-api-key
            - name: BACKSTAGE_URL
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: backstage-url
            - name: BACKSTAGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: backstage-token
            - name: GRAPH_KB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: graph-kb-token
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /app/models
            - name: HF_HUB_OFFLINE
              value: "1"
          volumeMounts:
            - name: kb-data
              mountPath: /app/kb
            - name: documents
              mountPath: /app/documents
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: kb-data
          persistentVolumeClaim:
            claimName: graph-kb-data
        - name: documents
          persistentVolumeClaim:
            claimName: graph-kb-documents
        - name: tmp
          emptyDir: {}
