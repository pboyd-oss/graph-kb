apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: graph-kb-data
  namespace: graph-kb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: graph-kb-documents
  namespace: graph-kb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: longhorn
