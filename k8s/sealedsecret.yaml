# Seal this with:
#   kubectl create secret generic graph-kb-secrets \
#     --namespace graph-kb \
#     --from-literal=anthropic-api-key='sk-ant-...' \
#     --from-literal=backstage-url='https://backstage.yourcompany.com' \
#     --from-literal=backstage-token='' \
#     --dry-run=client -o yaml \
#   | kubeseal --format yaml > k8s/sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: graph-kb-secrets
  namespace: graph-kb
spec:
  encryptedData:
    anthropic-api-key: ""
    backstage-url: ""
    backstage-token: ""
  template:
    metadata:
      name: graph-kb-secrets
      namespace: graph-kb
    type: Opaque
