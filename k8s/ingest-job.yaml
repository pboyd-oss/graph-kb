apiVersion: batch/v1
kind: Job
metadata:
  name: graph-kb-ingest
  namespace: graph-kb
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: harbor-docker-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingest
          image: harbor.tuxgrid.com/platform/graph-kb@sha256:ec46d72a5ffe61fe9fdfd820afb4d791fe536b718a35be37de46b6e732c77cd1
          command: ["python3", "/app/run_ingest.py"]
          env:
            - name: GRAPH_KB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: graph-kb-secrets
                  key: graph-kb-token
            - name: KB_URL
              value: "http://graph-kb.graph-kb.svc.cluster.local:8000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
