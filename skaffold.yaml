apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: graph-kb

build:
  artifacts:
    - image: harbor.tuxgrid.com/platform/graph-kb
      kaniko:
        dockerfile: Dockerfile
  cluster:
    namespace: jenkins
    dockerConfig:
      secretName: gitea-docker-cfg
  tagPolicy:
    gitCommit: {}

manifests:
  rawYaml:
    - k8s/namespace.yaml
    - k8s/sealedsecret.yaml
    - k8s/pvc.yaml
    - k8s/deployment.yaml
    - k8s/service.yaml
    - k8s/httproute.yaml
    - k8s/networkpolicy.yaml
    - k8s/resourcequota.yaml

deploy:
  kubectl:
    defaultNamespace: graph-kb
